$SCRIPTS = $HOME/.config/hypr/scripts

$terminal = kitty
$text_editor = kitty -e nvim 
$file_browser = dolphin 
$browser = firefox 
$system_monitor = kitty -e btop 

# Window/Session Actions
bindd = Super, Q, Close active window, killactive,
bindd = Super, Delete, Kill Hyprland, exit
bindd = Super, W, Toggle window floating, togglefloating,
bindd = Alt, Return, Toggle fullscreen, fullscreen, toggle
bindd = Super, L, Lock screen, exec, hyprlock
bindd = Super, Backspace, Logout, exec, $HOME/.config/hypr/scripts/logout.sh
# Application Shortcuts
bindd = Super, T, Terminal, exec, $terminal
bindd = Super, E, File browser, exec, $file_browser
bindd = Super, C, Text editor, exec, $text_editor
bindd = Super, F, Web browser, exec, $browser
bindd = Ctrl+Shift, Escape, System monitor, exec, $system_monitor
bindd = Super+Shift, P, Color Picker, exec, hyprpicker -a
bindd = Super, P, Screenshot, exec, fish $SCRIPTS/screenshot.fish
# Rofi menus 
bindd = Super, A, App launcher, exec, pkill -x rofi || rofi -show drun -theme $HOME/.config/rofi/config.rasi
bindd = Super, Tab, Window switcher, exec, pkill -x rofi || rofi -show window -theme $HOME/.config/rofi/config.rasi
# Audio Control
#TODO
#Media Control
binddl = Super+Ctrl, 0, Media previous, exec, playerctl previous
binddl = Super+Ctrl, =, Media next, exec, playerctl next
binddl = Super+Ctrl, -, Media play/pause, exec, playerctl play-pause
# Move window focus
bindd = Super, I, Focus window above, movefocus, u
bindd = Super, K, Focus window below, movefocus, d
bindd = Super, J, Focus window left, movefocus, l
bindd = Super, L, Focus window right, movefocus, r
# Move monitor focus 
bindd = Super+Ctrl, 1, Focus previous monitor, focusmonitor, r-1
bindd = Super+Ctrl, 2, Focus next monitor, focusmonitor, r+1
# Workspace switching 
bindd = Super, 1, View previous workspace, workspace, r-1
bindd = Super, 2, View next workspace, workspace, r+1
bindd = Super, mouse_down, View prevous workspace (scroll), workspace, r-1
bindd = Super, mouse_up, View next workspace (scroll), workspace, r+1
# Move focused window to relative workspace 
bindd = Super+Shift, 1, Move to previous workspace, movetoworkspace, r-1
bindd = Super+Shift, 2, Move to next workspace, movetoworkspace, r+1
bindd = Super+Alt, 1, Move to prevous workspace silently, movetoworkspacesilent, r-1
bindd = Super+Alt, 2, Move to next workspace silently, movetoworkspacesilent, r+1
# Move/Resize windows 
bindmd = Super, mouse:272, Move window (mouse), movewindow
bindmd = Super, mouse:273, Resize window (mouse), resizewindow
bindmd = Super, Z, Move window, movewindow
bindmd = Super, X, Resize window, resizewindow

# Toggle split direction 
#bindd = Super, J, Toggle window split direction, togglesplit




