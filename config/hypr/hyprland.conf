$SCRIPTS = $HOME/.config/hypr/scripts

$terminal = kitty
$text_editor = kitty -e nvim 
$file_browser = dolphin 
$browser = firefox 
$system_monitor = kitty -e btop 

# Window/Session Actions
# Close window
bindd = Super, Q, Close active window, closewindow,                                                                       ## Close active window
# Kill hyprland
bindd = Super, Delete, Kill Hyprland, exit,                                                                               ## Kill hyprland 
# Toggle window floating
bindd = Super, W, Toggle window floating, togglefloating,                                                                 ## Toggle window floating
# Toggle fullscreen
bindd = Alt, Return, Toggle fullscreen, fullscreen,                                                                       ## Toggle fullscreen
# Start hyprlock. IE lock screen 
bindd = Super, L, Lock screen, exec, hyprlock                                                                             ## Start hyprlock
# Launch logout menu
bindd = Super, Backspace, Logout, exec, $HOME/.config/hypr/scripts/logout.sh                                              ## Show logout/power menu

# Application Shortcuts
# Launch terminal 
bindd = Super, T, Terminal, exec, $terminal                                                                               ## Launch terminal
# Launch file manager 
bindd = Super, E, File browser, exec, $file_browser                                                                       ## Launch file manager
# Launch text editor 
bindd = Super, C, Text editor, exec, $text_editor                                                                         ## Launch text editor
# Launch web browesr 
bindd = Super, F, Web browser, exec, $browser                                                                             ## Launch web browser
# Launch system monitor 
bindd = Ctrl+Shift, Escape, System monitor, exec, $system_monitor                                                         ## Launch system monitor
# Launch color picker 
bindd = Super+Shift, P, Color Picker, exec, hyprpicker -a                                                                 ## Launch color picker
# Screenshot
bindd = Super, P, Screenshot, exec, fish $SCRIPTS/screenshot.fish                                                         ## Take a screenshot

# Rofi menus 
# App launcher 
bindd = Super, A, App launcher, exec, pkill -x rofi || rofi -show drun -theme $HOME/.config/rofi/config.rasi              ## Show app drawer
# Window switcher 
bindd = Super, Tab, Window switcher, exec, pkill -x rofi || rofi -show window -theme $HOME/.config/rofi/config.rasi       ## Show window switcher


# Audio Control 

# Media Control 
# Prevous
binddl = Super+Ctrl, 0, Media previous, exec, playerctl previous                                                          ## Previous song/media
# Next
binddl = Super+Ctrl, =, Media next, exec, playerctl next                                                                  ## Next song/media
# Play/Pause
binddl = Super+Ctrl, -, Media play/pause, exec, playerctl play-pause                                                      ## Play/pause song/media

# Move window focus
bindd = Super, I, Focus window above, movefocus, u                                                                        ## Move window focus up
bindd = Super, K, Focus window below, movefocus, d                                                                        ## Move window focus down
bindd = Super, J, Focus window left, movefocus, l                                                                         ## Move window focus left 
bindd = Super, L, Focus window right, movefocus, r                                                                        ## Move window focus right

# Move monitor focus 
bindd = Super+Ctrl, 1, Focus previous monitor, focusmonitor, r-1                                                          ## Focus prevous monitor 
bindd = Super+Ctrl, 2, Focus next monitor, focusmonitor, r+1                                                              ## Focus next monitor 

# Workspace switching 
bindd = Super, 1, View previous workspace, workspace, r-1                                                                 ## Move to prevous workspace
bindd = Super, 2, View next workspace, workspace, r+1                                                                     ## Move to next workspace 
bindd = Super, mouse_down, View prevous workspace (scroll), workspace, r-1                                                ## Move to prevous workspace (scroll)
bindd = Super, mouse_up, View next workspace (scroll), workspace, r+1                                                     ## Move to next workspace (scroll)

# Move focused window to relative workspace 
bindd = Super+Shift, 1, Move to previous workspace, movetoworkspace, r-1                                                  ## Move focused window to prevous workspace
bindd = Super+Shift, 2, Move to next workspace, movetoworkspace, r+1                                                      ## Move focused window to next workspace
bindd = Super+Alt, 1, Move to prevous workspace silently, movetoworkspacesilent, r-1                                      ## Move focused window to prevous workspace silently
bindd = Super+Alt, 2, Move to next workspace silently, movetoworkspacesilent, r+1                                         ## Move focused window to next workspace silently 

# Move/Resize windows 
bindmd = Super, mouse:272, Move window (mouse), movewindow,                                                               ## Move window (mouse) 
bindmd = Super, mouse:273, Resize window (mouse), resizewindow,                                                           ## Resize window (mouse)
bindmd = Super, Z, Move window, movewindow,                                                                               ## Move window (keyboard)
bindmd = Super, X, Resize window, resizewindow,                                                                           ## Resize window (keyboard) 

# Toggle split direction 
bindd = Super, J, Toggle window split direction, togglesplit,                                                             ## Toggle window split direction




