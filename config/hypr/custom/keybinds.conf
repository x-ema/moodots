bindd = Super, A, Toggle search, global, quickshell:searchToggleRelease # Toggle search
bind = Super, 1, workspace, r-1 # Switch to previous workspace
bind = Super, 2, workspace, r+1 # Switch to next workspace
bind = Super+Shift, 1, movetoworkspace, r-1 # Move window to previous workspace
bind = Super+Shift, 2, movetoworkspace, r+1 # Move window to next workspace
bind = Super, P, global, quickshell:regionScreenshot # Take a screenshot
bind = Super, W, togglefloating, # Toggle floating window
bind = Alt+Shift, Return, fullscreen, 0 # Toggle fullscreen window
bind = Alt, Return, fullscreen, 1
bind = Super, C, exec, kitty -e nvim # Open nvim
bind = Super, F, exec, firefox # Open Firefox
bind = Super, I, movefocus, u # Move focus up
bind = Super, K, movefocus, d # Move focus down
bind = Super, J, movefocus, l # Move focus left
bind = Super, L, movefocus, r # move focus right 
bind = Super+Shift, L, exec, loginctl lock-session



